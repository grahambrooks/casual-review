name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  BIN_NAME: cr

jobs:
  verify:
    name: verify version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Tag matches Cargo.toml
        run: |
          tag="${GITHUB_REF_NAME#v}"
          crate=$(awk -F'"' '/^version = / { print $2; exit }' Cargo.toml)
          if [ "$tag" != "$crate" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match Cargo.toml version $crate"
            exit 1
          fi
          echo "Tag $GITHUB_REF_NAME matches Cargo.toml version $crate"

  create-release:
    name: create github release
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      # Creates the GitHub Release entity that the build matrix will upload
      # binaries into. Companion to taiki-e/upload-rust-binary-action below.
      # If the release already exists (re-run on same tag), this is a no-op.
      - uses: taiki-e/create-gh-release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: build (${{ matrix.target }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          # x86_64-apple-darwin (Intel Mac) intentionally not built. Apple
          # ended Intel Mac sales in 2023 and the macos-13 GitHub runner queue
          # is unreliable. Intel Mac users can `cargo install` from source.

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build, package, and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: cr
          target: ${{ matrix.target }}
          archive: $bin-$tag-$target
          tar: unix
          zip: windows
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}

  ext-vscode:
    name: package vscode extension
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: extensions/vscode/package-lock.json

      - name: Sync extension version to tag
        working-directory: extensions/vscode
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          node -e "const p=require('./package.json'); p.version='${version}'; require('fs').writeFileSync('./package.json', JSON.stringify(p, null, 2)+'\n')"
          echo "package.json version is now ${version}"

      - name: npm ci
        working-directory: extensions/vscode
        run: npm ci --no-audit --no-fund

      - name: Compile + package .vsix
        working-directory: extensions/vscode
        run: |
          set -euo pipefail
          npm run compile
          version="${GITHUB_REF_NAME#v}"
          npx --yes @vscode/vsce@latest package \
            --no-dependencies \
            --out "casual-review-${version}.vsix"

      - name: Upload .vsix to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          gh release upload "${GITHUB_REF_NAME}" \
            "extensions/vscode/casual-review-${version}.vsix" \
            --clobber

  ext-jetbrains:
    name: package jetbrains plugin
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4

      - name: Sync plugin version to tag
        working-directory: extensions/jetbrains
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          # Replace the version assignment in build.gradle.kts.
          sed -i "s/^version = \"[^\"]*\"/version = \"${version}\"/" build.gradle.kts
          grep '^version = ' build.gradle.kts

      - name: gradlew buildPlugin
        working-directory: extensions/jetbrains
        run: ./gradlew --no-daemon buildPlugin

      - name: Upload .zip to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          src="extensions/jetbrains/build/distributions/casual-review-jetbrains-${version}.zip"
          ls -la "$(dirname "$src")"
          gh release upload "${GITHUB_REF_NAME}" "$src" --clobber

  ext-zed:
    name: package zed extension
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: extensions/zed
          key: zed-ext-release

      - name: Sync extension version to tag
        working-directory: extensions/zed
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = \"[^\"]*\"/version = \"${version}\"/" extension.toml
          sed -i "s/^version = \"[^\"]*\"/version = \"${version}\"/" Cargo.toml
          grep '^version = ' extension.toml Cargo.toml

      - name: cargo build --release --target wasm32-wasip1
        working-directory: extensions/zed
        run: cargo build --release --target wasm32-wasip1

      - name: Upload .wasm to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          src="extensions/zed/target/wasm32-wasip1/release/casual_review_zed.wasm"
          dst="casual-review-zed-${version}.wasm"
          cp "$src" "$dst"
          gh release upload "${GITHUB_REF_NAME}" "$dst" --clobber

  update-formula:
    name: update homebrew formula
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Formula/casual-review.rb
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"

          # Wait briefly for release assets to settle
          sleep 10

          declare -A targets=(
            [aarch64-apple-darwin]=darwin_arm
            [aarch64-unknown-linux-gnu]=linux_arm
            [x86_64-unknown-linux-gnu]=linux_intel
          )

          declare -A shas

          for target in "${!targets[@]}"; do
            url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}/cr-${tag}-${target}.tar.gz"
            echo "Fetching SHA256 for $target from $url"
            sha=$(curl -sL "$url" | sha256sum | awk '{print $1}')
            if [ -z "$sha" ] || [ "$sha" = "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855" ]; then
              echo "::error::could not fetch $url"
              exit 1
            fi
            shas[$target]=$sha
            echo "  $target = $sha"
          done

          python3 scripts/render-formula.py \
            "${version}" \
            "${shas[aarch64-apple-darwin]}" \
            "${shas[aarch64-unknown-linux-gnu]}" \
            "${shas[x86_64-unknown-linux-gnu]}" \
            > Formula/casual-review.rb

      - name: Commit updated formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet Formula/casual-review.rb; then
            echo "Formula unchanged"
            exit 0
          fi
          git add Formula/casual-review.rb
          git commit -m "Update Homebrew formula for ${GITHUB_REF_NAME}"
          git push origin main
